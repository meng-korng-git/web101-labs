    <!-- Main Content -->
    <main>

        <section id="about">
            <h2>About Me</h2>

            <img src="https://t3.ftcdn.net/jpg/13/11/22/86/360_F_1311228699_YoiLc5aJ3RWz3uRfdEtlV0UYSQjqf7RW.jpg"
                alt="Photo of Tol Mengkong" width="200">

            <p>
                Hello! My name is Tol Mengkorng.
                I am a Second-year student studying Information Technology Engineering
                at the Royal University of Phnom Penh.
            </p>
        </section>

        <section id="projects">
            <h2>My Links</h2>

            <ul>
                <li>
                    <a href="https://github.com/meng-korng-git">
                        GitHub
                    </a>
                </li>
            </ul>
        </section>

        <section id="contact">
            <h2>Contact Me</h2>

            <form>

                <label for="name">Full Name</label><br>
                <input type="text" id="name" name="name" required minlength="3">
                <br><br>

                <label for="email">Email Address</label><br>
                <input type="email" id="email" name="email" required>
                <br><br>

                <label for="topic">Topic</label><br>
                <select id="topic" name="topic" required>
                    <option value="">Select a topic</option>
                    <option value="school">School</option>
                    <option value="project">Project</option>
                    <option value="job">Job Opportunity</option>
                </select>
                <br><br>

                <label for="message">Message</label><br>
                <textarea id="message" name="message" rows="5" cols="30"
                    required minlength="10"></textarea>
                <br><br>

                <label for="phone">Phone Number</label><br>
                <input type="tel" id="phone" name="phone"
                    pattern="[0-9]{9,10}">
                <br><br>

                <button type="submit">Send Message</button>

            </form>
        </section>

    </main>
